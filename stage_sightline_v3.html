
<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, sans-serif); background: transparent; }
.wrap { padding: 0.5rem 0; }
canvas { display: block; width: 100%; border-radius: 12px; border: 0.5px solid var(--border, #ddd); background: var(--surface-1, #f9f9f9); cursor: grab; }
canvas.drag { cursor: grabbing; }
.hint { font-size: 10px; color: var(--text-muted, #999); text-align: center; margin: 4px 0 8px; }
.cam-btns { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
.cam-btn { font-size: 11px; padding: 3px 9px; border-radius: 6px; border: 0.5px solid var(--border-strong, #ccc); background: var(--surface-1, #f9f9f9); color: var(--text-secondary, #555); cursor: pointer; }
.cam-btn:hover { background: var(--surface-0, #eee); }
.panels { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.panel { background: var(--surface-1, #f9f9f9); border: 0.5px solid var(--border, #ddd); border-radius: 8px; padding: 9px 11px; }
.ptitle { font-size: 11px; font-weight: 600; color: var(--text-secondary, #666); margin-bottom: 5px; }
.row { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
.row label { font-size: 10px; color: var(--text-muted, #999); min-width: 34px; }
.row input[type=range] { flex: 1; }
.row span { font-size: 10px; min-width: 36px; text-align: right; }
.result { background: var(--surface-1, #f9f9f9); border: 0.5px solid var(--border-accent, #aaa); border-radius: 8px; padding: 10px 13px; }
.rtitle { font-size: 11px; font-weight: 600; color: var(--text-secondary, #666); margin-bottom: 7px; }
.badges { display: flex; gap: 8px; margin-bottom: 8px; }
.badge { flex: 1; text-align: center; border-radius: 6px; padding: 6px 4px; font-size: 12px; font-weight: 600; border: 1.5px solid transparent; transition: all 0.2s; }
.badge .bl { font-size: 10px; font-weight: 400; margin-top: 2px; color: inherit; opacity: 0.75; }
.badge-in  { background: #d1fae5; border-color: #34d399; color: #065f46; }
.badge-out { background: #fee2e2; border-color: #f87171; color: #991b1b; }
.badge-hit { background: #fef3c7; border-color: #fbbf24; color: #92400e; }
.vgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.vbox { background: var(--surface-0, #eee); border-radius: 5px; padding: 5px; text-align: center; }
.vval { font-size: 14px; font-weight: 500; }
.vlbl { font-size: 9px; color: var(--text-muted, #999); margin-top: 1px; }
.arow { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 6px; }
.abox { background: var(--surface-0, #eee); border-radius: 5px; padding: 5px; text-align: center; }
.aval { font-size: 13px; font-weight: 500; color: var(--text-accent, #3b82f6); }
.albl { font-size: 9px; color: var(--text-muted, #999); }
.coord { font-size: 10px; color: var(--text-muted, #999); margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="c" height="400"></canvas>
  <p class="hint">カメラ: ドラッグで回転 / スクロールでズーム　｜　観客(●): 3Dビュー上でドラッグして移動</p>

  <div class="cam-btns">
    <span style="font-size:10px;color:var(--text-muted,#999);margin-right:2px">視点:</span>
    <button class="cam-btn" onclick="setView(30,28)">斜め</button>
    <button class="cam-btn" onclick="setView(0,89)">真上</button>
    <button class="cam-btn" onclick="setView(0,1)">正面</button>
    <button class="cam-btn" onclick="setView(90,1)">左横</button>
    <button class="cam-btn" onclick="setView(-90,1)">右横</button>
    <button class="cam-btn" onclick="setView(180,1)">後方</button>
    <button class="cam-btn" onclick="setView(0,-45)">見上げ</button>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="ptitle">ステージ</div>
      <div class="row"><label>幅</label><input type="range" id="sw" min="4" max="20" value="10" step="0.5"><span id="sw-v">10m</span></div>
      <div class="row"><label>奥行</label><input type="range" id="sd" min="2" max="12" value="5" step="0.5"><span id="sd-v">5m</span></div>
      <div class="row"><label>高さ</label><input type="range" id="sh" min="0" max="3" value="1" step="0.1"><span id="sh-v">1.0m</span></div>
    </div>
    <div class="panel">
      <div class="ptitle">演者</div>
      <div class="row"><label>左右</label><input type="range" id="px" min="-1" max="1" value="0" step="0.05"><span id="px-v">0%</span></div>
      <div class="row"><label>前後</label><input type="range" id="pz" min="0.05" max="0.95" value="0.5" step="0.05"><span id="pz-v">50%</span></div>
      <div class="row"><label>身長</label><input type="range" id="ph" min="1.4" max="2.0" value="1.65" step="0.05"><span id="ph-v">1.65m</span></div>
    </div>
    <div class="panel">
      <div class="ptitle">視線方向</div>
      <div class="row"><label>左右</label><input type="range" id="vy" min="-80" max="80" value="0" step="1"><span id="vy-v">0°</span></div>
      <div class="row"><label>上下</label><input type="range" id="vp" min="-40" max="40" value="-5" step="1"><span id="vp-v">-5°</span></div>
    </div>
    <div class="panel">
      <div class="ptitle">視野角</div>
      <div class="row"><label>有効視野</label><input type="range" id="fov" min="5" max="120" value="30" step="1"><span id="fov-v">30°</span></div>
      <div class="row"><label>最大視野</label><input type="range" id="fov2" min="10" max="180" value="120" step="5"><span id="fov2-v">120°</span></div>
      <div class="row"><label>観客身長</label><input type="range" id="ah" min="1.4" max="2.0" value="1.65" step="0.05"><span id="ah-v">1.65m</span></div>
    </div>
  </div>

  <div class="result">
    <div class="rtitle">判定結果</div>
    <div class="badges">
      <div class="badge" id="b-fov"><div id="b-fov-t">—</div><div class="bl">有効視野内</div></div>
      <div class="badge" id="b-max"><div id="b-max-t">—</div><div class="bl">最大視野内</div></div>
      <div class="badge" id="b-eye"><div id="b-eye-t">—</div><div class="bl">視線が合う</div></div>
    </div>
    <div class="vgrid">
      <div class="vbox"><div class="vval" id="rx">—</div><div class="vlbl">Vx</div></div>
      <div class="vbox"><div class="vval" id="ry">—</div><div class="vlbl">Vy</div></div>
      <div class="vbox"><div class="vval" id="rz">—</div><div class="vlbl">Vz</div></div>
    </div>
    <div class="arow">
      <div class="abox"><div class="aval" id="ra-h">—</div><div class="albl">水平角</div></div>
      <div class="abox"><div class="aval" id="ra-v">—</div><div class="albl">垂直角</div></div>
      <div class="abox"><div class="aval" id="ra-d">—</div><div class="albl">距離</div></div>
    </div>
    <div class="arow">
      <div class="abox"><div class="aval" id="ang-fov">—</div><div class="albl">視線角度差</div></div>
      <div class="abox"><div class="aval" id="ang-eye">—</div><div class="albl">観客→演者角</div></div>
      <div class="abox"><div class="aval" id="ang-efov">—</div><div class="albl">視線閾値</div></div>
    </div>
    <div class="coord" id="coord">—</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let camYaw = 30, camPitch = 28, camDist = 28;
let camDragging = false, lastX = 0, lastY = 0;

// Audience position (world coords)
let aud = { x: 0, z: 12 };
let audDragging = false;

function setView(y, p) { camYaw = y; camPitch = p; draw(); }

function gp(id) { return parseFloat(document.getElementById(id).value); }
function getP() {
  return {
    sw: gp('sw'), sd: gp('sd'), sh: gp('sh'),
    px: gp('px'), pz: gp('pz'), ph: gp('ph'),
    vy: gp('vy') * Math.PI / 180,
    vp: gp('vp') * Math.PI / 180,
    fov: gp('fov') * Math.PI / 180,
    fov2: gp('fov2') * Math.PI / 180,
    ah: gp('ah'),
  };
}

function project(x, y, z) {
  const yaw = camYaw * Math.PI / 180;
  const pitch = camPitch * Math.PI / 180;
  const x1 = x * Math.cos(yaw) + z * Math.sin(yaw);
  const y1 = y;
  const z1 = -x * Math.sin(yaw) + z * Math.cos(yaw);
  const x2 = x1;
  const y2 = y1 * Math.cos(pitch) - z1 * Math.sin(pitch);
  const z2 = y1 * Math.sin(pitch) + z1 * Math.cos(pitch);
  const scale = 340 / (camDist + z2 + 0.001);
  return { sx: canvas.width/2 + x2*scale, sy: canvas.height/2 - y2*scale, depth: z2, scale };
}

function line3(ax,ay,az,bx,by,bz,col,lw,dash=[]) {
  const a=project(ax,ay,az), b=project(bx,by,bz);
  ctx.save(); ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy);
  ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.setLineDash(dash); ctx.stroke(); ctx.restore();
}
function poly3(pts,fill,stroke,lw=0.5) {
  const ps=pts.map(([x,y,z])=>project(x,y,z));
  ctx.beginPath(); ps.forEach((p,i)=>i===0?ctx.moveTo(p.sx,p.sy):ctx.lineTo(p.sx,p.sy)); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}
function dot3(ax,ay,az,bx,by,bz){return ax*bx+ay*by+az*bz;}
function len3(x,y,z){return Math.sqrt(x*x+y*y+z*z);}
function norm3(x,y,z){const l=len3(x,y,z);return[x/l,y/l,z/l];}

// Draw FOV boundary as fan lines + arc (2D-style in 3D)
function drawFovBoundary(ex,ey,ez,gx,gy,gz,halfAngle,len,col,lw,dash) {
  // perpendicular basis on the plane through gaze
  let ux=0,uy=1,uz=0;
  const d=dot3(gx,gy,gz,ux,uy,uz);
  let rx=ux-d*gx, ry=uy-d*gy, rz=uz-d*gz;
  const rl=len3(rx,ry,rz); rx/=rl;ry/=rl;rz/=rl;
  // forward cross right = up-in-cone
  const fx=gy*rz-gz*ry, fy=gz*rx-gx*rz, fz=gx*ry-gy*rx;

  const N=32;
  const arcPts=[];
  for(let i=0;i<=N;i++){
    const a=(i/N)*Math.PI*2;
    const cv=Math.cos(a), sv=Math.sin(a);
    // direction at this azimuth around gaze at halfAngle
    const cosH=Math.cos(halfAngle), sinH=Math.sin(halfAngle);
    const dx=cosH*gx + sinH*(cv*rx+sv*fx);
    const dy=cosH*gy + sinH*(cv*ry+sv*fy);
    const dz=cosH*gz + sinH*(cv*rz+sv*fz);
    arcPts.push([ex+dx*len, ey+dy*len, ez+dz*len]);
  }
  // draw edge lines (spoke every 90°)
  for(let i=0;i<4;i++){
    const pt=arcPts[Math.round(i*N/4)];
    line3(ex,ey,ez,pt[0],pt[1],pt[2],col,lw,dash);
  }
  // draw arc ring
  for(let i=0;i<N;i++){
    const a=arcPts[i],b=arcPts[i+1];
    line3(a[0],a[1],a[2],b[0],b[1],b[2],col,lw,dash);
  }
}

// Projected position of audience (for drag)
let audProj = {sx:0, sy:0};

function draw() {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const p=getP();
  const dark=window.matchMedia('(prefers-color-scheme: dark)').matches;

  const stageTop  = dark?'#1b3328':'#c8e6c9';
  const stageSide = dark?'#122318':'#a5d6a7';
  const stageLine = dark?'#2a5040':'#66bb6a';
  const gridCol   = dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)';
  const perfCol   = '#ef4444';
  const gazeCol   = '#3b82f6';
  const fov1Col   = dark?'rgba(59,130,246,0.7)':'rgba(37,99,235,0.65)';  // 有効視野
  const fov2Col   = dark?'rgba(59,130,246,0.22)':'rgba(59,130,246,0.2)'; // 最大視野
  const refCol    = dark?'rgba(59,130,246,0.18)':'rgba(59,130,246,0.15)'; // 基準線
  const textCol   = dark?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.35)';

  const half=p.sw/2;

  // Stage
  poly3([[-half,0,p.sd],[-half,p.sh,p.sd],[half,p.sh,p.sd],[half,0,p.sd]], dark?'#0d1a12':'#b2d8b0', stageLine,0.5);
  poly3([[-half,0,0],[-half,0,p.sd],[-half,p.sh,p.sd],[-half,p.sh,0]], stageSide, stageLine,0.5);
  poly3([[half,0,0],[half,0,p.sd],[half,p.sh,p.sd],[half,p.sh,0]], stageSide, stageLine,0.5);
  poly3([[-half,0,0],[-half,p.sh,0],[half,p.sh,0],[half,0,0]], stageSide, stageLine,0.5);
  poly3([[-half,p.sh,0],[half,p.sh,0],[half,p.sh,p.sd],[-half,p.sh,p.sd]], stageTop, stageLine,0.8);

  // Grid
  const gw=(p.sw+6), gd=25;
  for(let i=-gw/2;i<=gw/2;i+=2) line3(i,0,0,i,0,gd,gridCol,0.5);
  for(let d=0;d<=gd;d+=2) line3(-gw/2,0,d,gw/2,0,d,gridCol,0.5);

  const perfX=p.px*half, perfZ=p.pz*p.sd;
  const perfY=p.sh, eyeY=perfY+p.ph;

  const gx=Math.sin(p.vy)*Math.cos(p.vp);
  const gy=Math.sin(p.vp);
  const gz=Math.cos(p.vy)*Math.cos(p.vp);

  // --- FOV boundaries ---
  const coneLen=18;

  // 最大視野 (薄い)
  drawFovBoundary(perfX,eyeY,perfZ, gx,gy,gz, p.fov2/2, coneLen, fov2Col, 0.8, [4,4]);

  // 有効視野 (はっきり)
  drawFovBoundary(perfX,eyeY,perfZ, gx,gy,gz, p.fov/2, coneLen, fov1Col, 1.5, []);

  // 基準線 (視線中心軸 + 水平/垂直参照)
  // center gaze line (thin)
  line3(perfX,eyeY,perfZ, perfX+gx*coneLen,eyeY+gy*coneLen,perfZ+gz*coneLen, refCol, 0.8, [6,4]);
  // horizontal reference at eye height
  line3(perfX-gw/2,eyeY,perfZ, perfX+gw/2,eyeY,perfZ, dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)', 0.5, [2,4]);

  // --- Audience ---
  const audY = 0; // floor
  const audEyeY = p.ah;
  const ap = project(aud.x, audEyeY, aud.z);
  audProj = ap;

  // vertical body line
  const ab = project(aud.x, 0, aud.z);
  ctx.beginPath(); ctx.moveTo(ab.sx,ab.sy); ctx.lineTo(ap.sx,ap.sy);
  ctx.strokeStyle=dark?'#60a5fa':'#2563eb'; ctx.lineWidth=2.5; ctx.stroke();
  // head dot
  ctx.beginPath(); ctx.arc(ap.sx,ap.sy,7,0,Math.PI*2);
  ctx.fillStyle=dark?'#3b82f6':'#1d4ed8'; ctx.fill();
  ctx.strokeStyle='white'; ctx.lineWidth=1.5; ctx.stroke();
  // label
  ctx.font=`10px var(--font-sans,sans-serif)`; ctx.fillStyle=dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.5)';
  ctx.fillText('観客',ap.sx+9,ap.sy-4);

  // Ray from performer eye to audience eye
  const dx=aud.x-perfX, dy=audEyeY-eyeY, dz=aud.z-perfZ;
  const dist=len3(dx,dy,dz);
  const [nx,ny,nz]=norm3(dx,dy,dz);
  const cosTheta=Math.max(-1,Math.min(1,dot3(nx,ny,nz,gx,gy,gz)));
  const theta=Math.acos(cosTheta);
  const inFov=theta<p.fov/2;
  const inFov2=theta<p.fov2/2;

  // audience→performer angle
  const [ax2,ay2,az2]=norm3(-dx,-dy,-dz);
  // assume audience faces -Z (toward stage)
  const audGx=0,audGy=0,audGz=-1;
  const cosEye=Math.max(-1,Math.min(1,dot3(ax2,ay2,az2,audGx,audGy,audGz)));
  const eyeAngle=Math.acos(cosEye)*180/Math.PI;
  const eyeMatch=inFov2 && eyeAngle<30;

  // ray color based on status
  let rayCol = inFov ? '#10b981' : inFov2 ? '#f59e0b' : '#94a3b8';
  line3(perfX,eyeY,perfZ, aud.x,audEyeY,aud.z, rayCol,1.5,[4,3]);

  // Performer body
  line3(perfX,perfY,perfZ, perfX,perfY+p.ph*0.85,perfZ, perfCol,2.5);
  line3(perfX-0.3,perfY+p.ph*0.55,perfZ, perfX+0.3,perfY+p.ph*0.55,perfZ, perfCol,2);
  // head
  const hp=project(perfX,eyeY,perfZ);
  ctx.beginPath(); ctx.arc(hp.sx,hp.sy,7,0,Math.PI*2);
  ctx.fillStyle=perfCol; ctx.fill();
  // gaze arrow (short, bold)
  const gl=2.2;
  line3(perfX,eyeY,perfZ, perfX+gx*gl,eyeY+gy*gl,perfZ+gz*gl, gazeCol,2.5);
  const ge=project(perfX+gx*gl,eyeY+gy*gl,perfZ+gz*gl);
  ctx.beginPath(); ctx.arc(ge.sx,ge.sy,4,0,Math.PI*2); ctx.fillStyle=gazeCol; ctx.fill();

  // Stage label
  ctx.font=`11px var(--font-sans,sans-serif)`; ctx.fillStyle=textCol;
  const sl=project(0,p.sh+0.1,p.sd/2);
  ctx.textAlign='center'; ctx.fillText('STAGE',sl.sx,sl.sy); ctx.textAlign='left';

  // Update result
  document.getElementById('rx').textContent=nx.toFixed(3);
  document.getElementById('ry').textContent=ny.toFixed(3);
  document.getElementById('rz').textContent=nz.toFixed(3);
  document.getElementById('ra-h').textContent=(Math.atan2(dx,dz)*180/Math.PI).toFixed(1)+'°';
  document.getElementById('ra-v').textContent=(Math.atan2(dy,Math.sqrt(dx*dx+dz*dz))*180/Math.PI).toFixed(1)+'°';
  document.getElementById('ra-d').textContent=dist.toFixed(2)+'m';
  document.getElementById('ang-fov').textContent=(theta*180/Math.PI).toFixed(1)+'°';
  document.getElementById('ang-eye').textContent=eyeAngle.toFixed(1)+'°';
  document.getElementById('ang-efov').textContent=(p.fov/2*180/Math.PI).toFixed(1)+'°';
  document.getElementById('coord').textContent=
    `演者目(${perfX.toFixed(1)}, ${eyeY.toFixed(1)}, ${perfZ.toFixed(1)})  ` +
    `観客目(${aud.x.toFixed(1)}, ${audEyeY.toFixed(1)}, ${aud.z.toFixed(1)})`;

  const setBadge=(id,ok,label)=>{
    const b=document.getElementById(id);
    b.className='badge '+(ok?'badge-in':'badge-out');
    document.getElementById(id+'-t').textContent=ok?'✅ YES':'❌ NO';
  };
  setBadge('b-fov',inFov);
  setBadge('b-max',inFov2);
  setBadge('b-eye',eyeMatch);
}

// Camera drag
canvas.addEventListener('mousedown',e=>{
  // check if clicking near audience
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  if(Math.hypot(mx-audProj.sx,my-audProj.sy)<14){
    audDragging=true;
  } else {
    camDragging=true; canvas.classList.add('drag');
  }
  lastX=e.clientX; lastY=e.clientY;
});
window.addEventListener('mouseup',()=>{ camDragging=false; audDragging=false; canvas.classList.remove('drag'); });
window.addEventListener('mousemove',e=>{
  if(camDragging){
    camYaw+=(e.clientX-lastX)*0.5;
    camPitch=Math.max(-89,Math.min(89,camPitch+(e.clientY-lastY)*0.5));
    lastX=e.clientX; lastY=e.clientY; draw();
  } else if(audDragging){
    // move audience in ground plane by unprojecting mouse delta
    const scl=camDist/340;
    const yaw=camYaw*Math.PI/180;
    const dx=(e.clientX-lastX)*scl, dy=(e.clientY-lastY)*scl;
    aud.x += dx*Math.cos(yaw) - (-dy)*Math.sin(yaw)*0;
    // approximate: move in screen-x → world-x, screen-y → world-z
    aud.x += dx*Math.cos(yaw);
    aud.z -= dy / Math.max(0.3,Math.cos(camPitch*Math.PI/180));
    // constrain audience to in front of stage and within reasonable bounds
    const p=getP();
    aud.z=Math.max(p.sd+0.3,Math.min(30,aud.z));
    aud.x=Math.max(-12,Math.min(12,aud.x));
    lastX=e.clientX; lastY=e.clientY; draw();
  }
});
canvas.addEventListener('wheel',e=>{ e.preventDefault(); camDist=Math.max(8,Math.min(70,camDist+e.deltaY*0.05)); draw(); },{passive:false});

// Touch
let touches=null,lastTDist=0,audTouch=false;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const rect=canvas.getBoundingClientRect();
    const mx=(e.touches[0].clientX-rect.left)*(canvas.width/rect.width);
    const my=(e.touches[0].clientY-rect.top)*(canvas.height/rect.height);
    if(Math.hypot(mx-audProj.sx,my-audProj.sy)<20){ audTouch=true; }
    else { audTouch=false; }
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    touches={x:lastX,y:lastY};
  } else if(e.touches.length===2){
    lastTDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
    if(audTouch){
      const scl=camDist/340;
      const yaw=camYaw*Math.PI/180;
      aud.x+=dx*scl*Math.cos(yaw)*2;
      aud.z-=dy*scl/Math.max(0.3,Math.cos(camPitch*Math.PI/180))*1.5;
      const p=getP();
      aud.z=Math.max(p.sd+0.3,Math.min(30,aud.z));
      aud.x=Math.max(-12,Math.min(12,aud.x));
    } else {
      camYaw+=dx*0.5;
      camPitch=Math.max(-89,Math.min(89,camPitch+dy*0.5));
    }
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; draw();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    camDist=Math.max(8,Math.min(70,camDist-(d-lastTDist)*0.1)); lastTDist=d; draw();
  }
},{passive:false});

// Sliders
const fmts={sw:v=>v+'m',sd:v=>v+'m',sh:v=>parseFloat(v).toFixed(1)+'m',
  px:v=>(parseFloat(v)*100).toFixed(0)+'%',pz:v=>(parseFloat(v)*100).toFixed(0)+'%',
  ph:v=>parseFloat(v).toFixed(2)+'m',vy:v=>v+'°',vp:v=>v+'°',
  fov:v=>v+'°',fov2:v=>v+'°',ah:v=>parseFloat(v).toFixed(2)+'m'};
for(const [id,fmt] of Object.entries(fmts)){
  document.getElementById(id).addEventListener('input',function(){
    document.getElementById(id+'-v').textContent=fmt(this.value); draw();
  });
}

function resize(){ canvas.width=canvas.offsetWidth; canvas.height=400; draw(); }
window.addEventListener('resize',resize);
resize();
</script>
</body>
