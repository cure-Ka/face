<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MediaPipe Face Mesh (角度・上下左右検知版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #222; 
            color: #fff; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        h1, p { 
            position: absolute; 
            left: 10px; 
            z-index: 10; 
            margin: 5px 0;
            font-size: 16px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        p { top: 30px; font-size: 12px; }

        .container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        #webcam, #output_canvas { 
            position: absolute; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
    </style>
</head>
<body>

    <h1>Face Mesh (角度＆上下左右検知)</h1>
    <p>外カメラで顔を映すとリアルタイムで角度を計算します</p>

    <div class="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // ★ ここから onResults 関数を丸ごとアップデートしました！
        function onResults(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks) {
                for (const landmarks of results.multiFaceLandmarks) {
                    // 1. 顔のメッシュ（網の目）を描画
                    drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#00FF00', lineWidth: 1});

                    // 2. 角度計算に必要なパーツの3D座標（X, Y, Z）をピンポイントで抽出
                    const nose = landmarks[1];        // 鼻の頭
                    const leftCheek = landmarks[234];  // 左顔の端（耳の前）
                    const rightCheek = landmarks[454]; // 右顔の端（耳の前）
                    const forehead = landmarks[10];    // おでこ
                    const chin = landmarks[152];       // あごの先

                    // 3. 認識の確認用にパーツの位置に赤い丸を描画
                    canvasCtx.fillStyle = '#FF0000';
                    canvasCtx.beginPath();
                    [nose, leftCheek, rightCheek, forehead, chin].forEach(pt => {
                        canvasCtx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 5, 0, 2 * Math.PI);
                    });
                    canvasCtx.fill();

                    // 4. 【左右の角度（Yaw）の計算】
                    // 左右の端のちょうど真ん中のX座標を計算
                    const midX = (leftCheek.x + rightCheek.x) / 2;
                    const widthFace = rightCheek.x - leftCheek.x;
                    const offsetX = nose.x - midX;
                    // 数学の「アークタンジェント」を使ってズレを角度（°）に変換
                    let angleX = Math.atan2(offsetX, widthFace) * (180 / Math.PI) * 1.5;

                    // 5. 【上下の角度（Pitch）の計算】
                    // おでことあごのちょうど真ん中のY座標を計算
                    const midY = (forehead.y + chin.y) / 2;
                    const heightFace = chin.y - forehead.y;
                    const offsetY = nose.y - midY;
                    let angleY = Math.atan2(offsetY, heightFace) * (180 / Math.PI) * 1.5;

                    // 小数を四捨五入して見やすい整数にする
                    const yaw = Math.round(angleX);
                    const pitch = Math.round(angleY);

                    // 6. 画面にテキストと数値を描画する設定
                    canvasCtx.fillStyle = '#00FF00';
                    const fontSize = Math.round(canvasElement.width * 0.045); 
                    canvasCtx.font = `bold ${fontSize}px sans-serif`;
                    
                    // 画面上部に常に現在の角度をリアルタイム表示
                    canvasCtx.fillText(`左右: ${yaw}°  上下: ${pitch}°`, canvasElement.width * 0.05, canvasElement.height * 0.12);

                    // 7. 角度に基づいた状態の判定ロジック
                    // 左右も上下も「5度以内」の傾きなら「正面（こっち見てる）」と判定
                    if (Math.abs(yaw) < 6 && Math.abs(pitch) < 6) {
                        canvasCtx.fillStyle = '#00FFFF'; // 正面はキレイな水色文字
                        canvasCtx.fillText('こっち見てる！ 😊', canvasElement.width * 0.05, canvasElement.height * 0.20);
                    } else {
                        let statusText = "";
                        // 外カメラの向きに合わせて表示文字を調整
                        if (yaw > 5) statusText += "右を向いてる ";
                        if (yaw < -5) statusText += "左を向いてる ";
                        if (pitch > 5) statusText += "下を向いてる ";
                        if (pitch < -5) statusText += "上を向いてる ";
                        
                        canvasCtx.fillStyle = '#FFCC00'; // 動いているときは目立つ黄色文字
                        canvasCtx.fillText(statusText, canvasElement.width * 0.05, canvasElement.height * 0.20);
                    }
                }
            }
            canvasCtx.restore();
        }

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});
        
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 1280,
            height: 720,
            facingMode: 'environment' // 外カメラ起動
        });
        camera.start();
    </script>
</body>
</html>
